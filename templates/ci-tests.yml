version: '1'
name: CI Tests Notification
description: Post to #tests when tests run in GitHub Actions, with link to the run

destination:
  service: slack
  settings:
    channel: '{{SLACK_CHANNEL_TESTS}}'

variables:
  status:
    description: Run status (success, failure, etc.)
    required: true
  branch:
    description: Git branch
    required: true
  sha:
    description: Commit SHA
    required: true
  workflow:
    description: Workflow name
    required: true
  run_url:
    description: URL to the GitHub Actions run
    required: true

message:
  blocks:
    - header:
        text: ':test_tube: Tests ran — {{status}}'
    - section:
        fields:
          - '*Branch:*\n`{{branch}}`'
          - '*Commit:*\n`{{sha}}`'
    - section:
        text: '<{{run_url}}|View workflow run ({{workflow}})>'
    - context:
        - 'Sent at {{now}}'
