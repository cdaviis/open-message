name: Publish to npm

on:
  release:
    types: [created]

jobs:
  build:
    name: Test, Lint, and Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run test:coverage

      - name: Build
        run: npm run build

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC/provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install PigeonJS CLI
        run: npm install -g pigeon-js

      - name: Notify #releases on Slack
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL_RELEASES: ${{ secrets.SLACK_CHANNEL_RELEASES }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          pigeon send ./templates/release-notification.yml \
            --var tag_name="${{ github.event.release.tag_name }}" \
            --var name="${{ github.event.release.name }}" \
            --var html_url="${{ github.event.release.html_url }}"
